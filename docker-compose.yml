version: "3.8"

services:
  app:
    build:
      context: ..
      dockerfile: jx3-jcl-service/Dockerfile
    ports:
      - "8090:8080"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    env_file:
      - .cloudflare.env
    restart: unless-stopped
    network_mode: service:app
    depends_on:
      - app
